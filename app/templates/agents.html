<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents List</title>

    <!-- Подключаем Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center">Agents List</h1>
        <form method="GET" action="{{ url_for('main.agents_list') }}" class="mb-3 d-flex gap-2">
            <select name="access_level" class="form-select w-auto">
                <option value="">All</option>
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
            </select>

            <button type="submit" class="btn btn-primary">
                Filter
            </button>
        </form>
        <div class="card shadow p-3">
            <table class="table table-bordered table-hover align-middle">
                <thead>
                    <tr>
                        <th>Nickname</th>
                        <th>Number</th>
                        <th>Email</th>
                        <th>Access Level</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for agent in agents %}
                    <tr>
                        <td>
                            <a href="{{ url_for('main.agent_detail', id=agent.id) }}">
                                {{ agent.nickname }}
                            </a>
                        </td>
                        <td>{{ agent.number }}</td>
                        <td>{{ agent.email }}</td>
                        <td>{{ agent.access_level }}</td>
                        <td>
                            <a href="{{ url_for('main.edit_agent', id=agent.id) }}" class="btn btn-sm btn-warning">
                                Edit
                            </a>

                            <a href="{{ url_for('main.delete_agent', id=agent.id) }}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure?')">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('main.add_agent') }}" class="btn btn-success">
                Add New Agent
            </a>
        </div>
    </div>

</body>
</html>
